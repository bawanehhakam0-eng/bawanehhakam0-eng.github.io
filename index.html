<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English With Hakam</title>
    <style>
        :root { --main: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        #lesson-page { display: none; width: 95%; max-width: 800px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; margin-top: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <h2>English With Hakam</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="login()">دخول الطالب</button>
    </div>

    <div id="lesson-page" class="card" style="max-width:800px;">
        <h2 style="color: var(--main);">مرحباً بك يا بطل!</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
        <button onclick="location.reload()" style="background:#888; margin-top:20px;">تسجيل الخروج</button>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBevYgKumOefR8llKZXgLu4neOptOO9Dzc",
    authDomain: "english-with-hakam.firebaseapp.com",
    projectId: "english-with-hakam",
    storageBucket: "english-with-hakam.firebasestorage.app",
    messagingSenderId: "370837955889",
    appId: "1:370837955889:web:ca95df27b0d98409f43c10"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.login = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('lesson-page').style.display = 'block';
      })
      .catch((error) => { alert("خطأ في البيانات"); });
  }
</script>
</body>
</html>
