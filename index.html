<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English With Hakam | المنصة التعليمية</title>
    <style>
        :root { --main: #075e54; --uk-blue: #00247d; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; padding: 20px; text-align: center; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .lesson-box { background: #f0f0f0; padding: 20px; border-radius: 15px; margin-top: 20px; border-top: 5px solid var(--uk-blue); }
        .play-btn { background: var(--main); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; margin-top: 15px; }
        .play-btn:active { background: #128c7e; transform: scale(0.98); }
        h1 { color: var(--uk-blue); font-size: 24px; }
    </style>
</head>
<body>

<div class="card">
    <h1>English With Hakam 🇬🇧</h1>
    <p>أهلاً بك في منصة التدريب الصوتي</p>

    <div class="lesson-box">
        <strong style="display:block; margin-bottom:10px;">Lesson 1: Greetings</strong>
        <p style="color: #555;">Alright mate, I’m Hakam!</p>
        
        <audio id="hakamAudio">
            <source src="https://docs.google.com/uc?export=download&id=1HkJpThJDyQiOWpzS0dD8DU-_HkKOfyK-" type="audio/mpeg">
            متصفحك لا يدعم تشغيل الصوت.
        </audio>

        <button class="play-btn" onclick="document.getElementById('hakamAudio').play()">▶ اضغط للاستماع للصوت</button>
    </div>

    <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">ملاحظة: إذا ضغطت ولم تسمع، تأكد من رفع صوت الهاتف.</p>
</div>

</body>
</html>
