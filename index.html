<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English With Hakam | المنصة التعليمية</title>
    <style>
        :root { --main: #075e54; --uk-blue: #00247d; --uk-red: #cf142b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0ebe3; margin: 0; padding: 20px; text-align: center; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header h1 { color: var(--uk-blue); margin-bottom: 5px; }
        .lesson-list { margin-top: 20px; text-align: right; }
        .lesson-item { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .lesson-item:hover { border-color: var(--main); background: #f9fff9; }
        .play-icon { background: var(--main); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slang-tag { background: var(--uk-red); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>English With Hakam 🇬🇧</h1>
        <p>مرحباً بك في ملزمة المستوى A1 الصوتية</p>
    </div>

    <div class="lesson-list">
        <div class="lesson-item" onclick="playAudio('1HkJpThJDyQiOWpzS0dD8DU-_HkKOfyK-')">
            <div>
                <strong>Lesson 1: Greetings</strong>
                <div style="font-size: 0.8rem; color: #777;">التحيات والتعارف</div>
            </div>
            <div class="play-icon">▶</div>
        </div>

        <div class="lesson-item" onclick="playAudio('اضع_رابط_درس_2_هنا')">
            <div>
                <strong>Lesson 2: Origins</strong>
                <div style="font-size: 0.8rem; color: #777;">من أين أنت؟</div>
            </div>
            <div class="play-icon">▶</div>
        </div>

        <div class="lesson-item" onclick="playAudio('اضع_رابط_درس_3_هنا')">
            <div>
                <strong>Lesson 3: Jobs</strong>
                <div style="font-size: 0.8rem; color: #777;">العمل والوظائف</div>
            </div>
            <div class="play-icon">▶</div>
        </div>
    </div>

    <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">اضغط على الدرس للاستماع للمحادثة</p>
</div>

<script>
    function playAudio(fileId) {
        if(fileId.includes('اضع_رابط')) {
            alert("هذا الدرس قيد التجهيز، سيتم إضافة الصوت قريباً!");
            return;
        }
        const url = `https://docs.google.com/uc?export=download&id=${fileId}`;
        new Audio(url).play();
    }
</script>

</body>
</html>
